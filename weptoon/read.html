<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beemtoon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href='https://fonts.googleapis.com/css?family=Trirong' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container-fluid px-0 bg-dark min-vh-100">
        <!-- แถบควบคุมด้านบน (ชื่อตอน / ปุ่มย้อนกลับ) -->
        <div class="d-flex justify-content-between align-items-center p-3 text-white bg-black sticky-top">
            <a href="index.html" class="btn btn-outline-light btn-sm">← กลับหน้าหลัก</a>
            <h5 class="m-0 fw-bold" id="ep-title">ชื่อตอนการ์ตูน</h5>
            <div style="width: 80px;"></div> <!-- เว้นขวาไว้ให้บาลานซ์ -->
        </div>

        <!-- โซนพ่นรูปภาพเนื้อหาการ์ตูน (หัวใจหลัก) -->
        <!-- d-flex flex-column บังคับรูปเรียงลงมาแนวตั้ง / p-0 และ m-0 เพื่อล้างขอบขาว -->
        <div id="comic-viewer" class="d-flex flex-column align-items-center p-0 m-0">
            <!-- ตัวอย่างแท็กรูปภาพที่จะให้ JavaScript พ่นออกมา หรือคุณจะแปะเอง -->
            <!-- <img src="images/ep1_01.jpg" class="w-100" style="max-width: 750px; display: block;"> -->
        </div>

        <!-- โซนปุ่มเปลี่ยนตอนด้านล่างสุด -->
        <div class="container text-center py-5 bg-dark">
            <div class="d-flex justify-content-center gap-3">
                <button class="btn btn-secondary px-4" id="btn-prev">ตอนก่อนหน้า</button>
                <button class="btn btn-success px-4" id="btn-next">ตอนต่อไป</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
