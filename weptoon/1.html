<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link href='https://googleapis.com' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ส่วนหัวเว็บเต็มจอ -->
    <div class="container-fluid px-0">
        <header class="text-center py-4" style="background-color: rgb(202, 255, 158); color: black; margin-bottom: 20px;">
            <h1 class="m-0 fw-bold">Welcome to Webtoon ยินดีด้วย</h1>
        </header>
    </div>

    <!-- ส่วนเนื้อหาหลักในกรอบระเบียบเดียวกัน -->
    <div class="container">
        <div class="row">
            
            <!-- สไลด์ภาพ (Carousel) -->
            <div class="col-12 mb-4">
                <div id="carouselExampleControlsNoTouching" class="carousel slide carousel-dark" data-bs-touch="true" data-bs-interval="true">
                    <div class="carousel-inner" style="border-radius: 10px; overflow: hidden;">
                        <div class="carousel-item active"><img src="images/1.jpg" class="d-block w-100 custom-photo" alt="image1"></div>
                        <div class="carousel-item"><img src="images/2.jpg" class="d-block w-100 custom-photo" alt="image2"></div>
                        <div class="carousel-item"><img src="images/3.jpg" class="d-block w-100 custom-photo" alt="image3"></div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleControlsNoTouching" data-bs-slide="prev"><span class="carousel-control-prev-icon" aria-hidden="true"></span></button>
                    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleControlsNoTouching" data-bs-slide="next"><span class="carousel-control-next-icon" aria-hidden="true"></span></button>
                </div>
            </div>

            <!-- หัวข้อรายการการ์ตูน -->
            <div class="col-12 mt-4">
                <h1>Popular Webtoons</h1>
            </div>

            <!-- แผงรับข้อมูลการ์ตูน (ปล่อยโล่งไว้ให้ไฟล์ script.js พ่นกล่องลงมาแสดงผล) -->
            <div class="col-12">
                <div class="row row-cols-5 g-2 mt-1" id="webtoon-grid"></div>
            </div>

        </div> <!-- ปิด row -->
    </div> <!-- ปิด container -->

    <!-- เรียกใช้ Bootstrap JS หลัก -->
    <script src="https://jsdelivr.net"></script>
    
    <!-- 💡 เพิ่มบรรทัดนี้: เชื่อมต่อไฟล์ดึงข้อมูล JavaScript ของเราเข้ามาทำงาน -->
    <script src="script.js"></script>
</body>

</html>
