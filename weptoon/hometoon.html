<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beemtoon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href='https://fonts.googleapis.com/css?family=Trirong' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container-fluid px-0 mb-4">
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">BEEMTOON</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">หน้าแรก</a>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button"
                                data-bs-toggle="dropdown" aria-expanded="false">
                                ประเภท
                            </a>
                            <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                                <li><a class="dropdown-item" href="#">แอคชั่น</a></li>
                                <li><a class="dropdown-item" href="#">โรแมนติก</a></li>
                                <li><a class="dropdown-item" href="#">คอมเมดี้</a></li>
                                <li><a class="dropdown-item" href="#">แฟนตาซี</a></li>
                                <li><a class="dropdown-item" href="#">ดราม่า</a></li>
                            </ul>
                        </li>
                    </ul>
                    <form class="d-flex">
                        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                        <button class="btn btn-outline-success" type="submit">Search</button>
                    </form>
                </div>
            </div>
        </nav>
    </div>
    <div class="container">
        <div class="row">
            <!-- โฆษณา-->
            <div class="col-12 mb-4">
                <div id="carouselExampleControlsNoTouching" class="carousel slide carousel-dark" data-bs-touch="true"
                    data-bs-interval="true">
                    <div class="carousel-inner" style="border-radius: 10px; overflow: hidden;">
                        <div class="carousel-item active">
                            <img src="images/1.jpg" class="d-block w-100 custom-photo" alt="image1">
                        </div>
                        <div class="carousel-item">
                            <img src="images/2.jpg" class="d-block w-100 custom-photo" alt="image2 ">
                        </div>
                        <div class="carousel-item">
                            <img src="images/3.jpg" class="d-block w-100 custom-photo" alt="image3">
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button"
                        data-bs-target="#carouselExampleControlsNoTouching" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    </button>
                    <button class="carousel-control-next " type="button"
                        data-bs-target="#carouselExampleControlsNoTouching" data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    </button>
                </div>
            </div>
            <!--หัวข้อ-->
            <div class="col-12 mt-4">
                <h1>Popular Webtoons</h1>
            </div>
            <!-- รายการการ์ตูน-->
            <div class="col-12">
                <div class="row row-cols-5 g-2 mt-1">
                    <!-- เรื่องที่ 1 -->
                    <div class="col">
                        <a href="#" class="text-decoration-none text-dark">
                            <div class="card h-100 border-0 shadow-sm position-relative"
                                style="border-radius: 10px; overflow: hidden;">
                                <span
                                    class="position-absolute top-0 start-0 bg-danger text-white px-2 py-0-5 m-2 rounded small"
                                    style="z-index: 1; font-size: 0.75rem;">ใหม่</span>
                                <img src="images/1.jpg" class="card-img-top object-fit-cover" alt="เรื่องที่ 1"
                                    style="height: 200px;">
                                <div class="card-body p-2">
                                    <div class="d-flex align-items-center mb-1">
                                        <h3 class="text-danger fw-bold me-2 m-0">1</h3>
                                        <h6 class="card-title fw-bold m-0 text-truncate">เรื่องสั้นไร้สติ</h6>
                                    </div>
                                    <p class="card-text text-muted small mb-0 text-truncate">คอมเมดี้</p>
                                </div>
                            </div>
                        </a>
                    </div>
                    <!-- เรื่องที่ 2 -->
                    <div class="col">
                        <a href="#" class="text-decoration-none text-dark">
                            <div class="card h-100 border-0 shadow-sm position-relative"
                                style="border-radius: 10px; overflow: hidden;">
                                <span
                                    class="position-absolute top-0 start-0 bg-warning text-dark px-2 py-0-5 m-2 rounded small"
                                    style="z-index: 1; font-size: 0.75rem;">UP</span>
                                <img src="images/2.jpg" class="card-img-top object-fit-cover" alt="เรื่องที่ 2"
                                    style="height: 200px;">
                                <div class="card-body p-2">
                                    <div class="d-flex align-items-center mb-1">
                                        <h3 class="text-secondary fw-bold me-2 m-0">2</h3>
                                        <h6 class="card-title fw-bold m-0 text-truncate">ชื่อเรื่องที่ 2</h6>
                                    </div>
                                    <p class="card-text text-muted small mb-0 text-truncate">แอคชั่น</p>
                                </div>
                            </div>
                        </a>
                    </div>
                    <!-- เรื่องที่ 3 -->
                    <div class="col">
                        <a href="#" class="text-decoration-none text-dark">
                            <div class="card h-100 border-0 shadow-sm" style="border-radius: 10px; overflow: hidden;">
                                <img src="images/3.jpg" class="card-img-top object-fit-cover" alt="เรื่องที่ 3"
                                    style="height: 200px;">
                                <div class="card-body p-2">
                                    <div class="d-flex align-items-center mb-1">
                                        <h3 class="text-secondary fw-bold me-2 m-0">3</h3>
                                        <h6 class="card-title fw-bold m-0 text-truncate">ชื่อเรื่องที่ 3</h6>
                                    </div>
                                    <p class="card-text text-muted small mb-0 text-truncate">ดราม่า</p>
                                </div>
                            </div>
                        </a>
                    </div>

                                    style="height: 200px;">
                                <div class="card-body p-2">
                                    <div class="d-flex align-items-center mb-1">
                                        <h3 class="text-secondary fw-bold me-2 m-0">4</h3>
                                        <h6 class="card-title fw-bold m-0 text-truncate">ชื่อเรื่องที่ 4</h6>
                                    </div>
                                    <p class="card-text text-muted small mb-0 text-truncate">แฟนตาซี</p>
                                </div>
                            </div>
                        </a>
                    </div>
                    <!-- เรื่องที่ 5 -->
                    <div class="col">
                        <a href="#" class="text-decoration-none text-dark">
                            <div class="card h-100 border-0 shadow-sm" style="border-radius: 10px; overflow: hidden;">
                                <img src="images/2.jpg" class="card-img-top object-fit-cover" alt="เรื่องที่ 5"
                                    style="height: 200px;">
                                <div class="card-body p-2">
                                    <div class="d-flex align-items-center mb-1">
                                        <h3 class="text-secondary fw-bold me-2 m-0">5</h3>
                                        <h6 class="card-title fw-bold m-0 text-truncate">ชื่อเรื่องที่ 5</h6>
                                    </div>
                                    <p class="card-text text-muted small mb-0 text-truncate">ตลกคอมเมดี้</p>
                                </div>
                            </div>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
